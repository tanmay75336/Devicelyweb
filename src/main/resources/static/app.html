<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devicely — Preview</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="preview-body">

  <!-- TOOLBAR -->
  <header class="preview-toolbar">
    <div class="toolbar-left">
      <a href="index.html" class="back-btn">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back
      </a>
      <div class="toolbar-logo">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="4" width="20" height="14" rx="2.5" stroke="#3ecf8e" stroke-width="2"/>
          <path d="M8 21h8M12 18v3" stroke="#3ecf8e" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>devicely</span>
      </div>
      <div class="toolbar-url-chip" id="toolbar-url-chip" style="display:none">
        <span class="url-dot"></span>
        <span id="toolbar-url-text">—</span>
      </div>
    </div>

    <div class="toolbar-center-tabs" id="device-tabs">
      <!-- filled by JS -->
    </div>

    <div class="toolbar-right">
      <button class="toolbar-icon-btn" id="btn-refresh" title="Refresh">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
      </button>
      <button class="toolbar-icon-btn" id="btn-copy-url" title="Copy URL">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
      <button class="toolbar-icon-btn" id="btn-open-tab" title="Open in new tab">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </button>
      <div class="toolbar-divider"></div>
      <div class="zoom-row">
        <button class="zoom-tiny-btn" id="zoom-out">−</button>
        <span class="zoom-pct" id="zoom-pct">100%</span>
        <button class="zoom-tiny-btn" id="zoom-in">+</button>
      </div>
      <div class="status-live-badge" id="status-live" style="display:none">
        <span class="live-green-dot"></span>
        Live
      </div>
    </div>
  </header>

  <!-- PREVIEW CANVAS -->
  <div class="preview-canvas" id="preview-canvas">
    <!-- Multi-viewport layout (when multiple selected) -->
    <div class="multi-viewport-layout" id="multi-viewport-layout" style="display:none">
      <!-- Filled dynamically -->
    </div>

    <!-- Single viewport layout -->
    <div class="single-viewport-layout" id="single-viewport-layout">
      <div class="scale-wrapper" id="scale-wrapper">
        <div class="device-shell-outer" id="device-shell-outer">
          <div class="device-label-tag" id="device-label-tag">Desktop · 1440 × 900</div>
          <div class="device-shell" id="device-shell" style="width:1440px;height:900px">
            <div class="frame-inner" id="frame-inner">
              <div class="frame-loading-overlay" id="frame-loading-overlay">
                <div class="frame-spinner"></div>
                <span>Loading preview…</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- No URL state -->
    <div class="no-url-state" id="no-url-state" style="display:none">
      <div class="no-url-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#3ecf8e" stroke-width="1.6" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          <line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/>
        </svg>
      </div>
      <h2>No site to preview</h2>
      <p>Go back and enter a URL to start previewing.</p>
      <a href="index.html" class="go-back-link">← Back to home</a>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div class="preview-statusbar">
    <div class="status-chip">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      Device: <strong id="status-device-name">Desktop</strong>
    </div>
    <div class="status-chip">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
      </svg>
      <span id="status-size-display">1440 × 900</span>
    </div>
    <div class="status-chip">
      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      Zoom: <strong id="status-zoom-pct">100%</strong>
    </div>
    <div class="status-chip" id="status-load-time" style="display:none">
      <span style="width:6px;height:6px;background:#3ecf8e;border-radius:50%;display:inline-block;"></span>
      <span id="load-time-text">—ms</span>
    </div>
  </div>

  <!-- TOAST STACK -->
  <div class="toast-stack" id="toast-stack"></div>

  <script src="js/app.js"></script>
</body>
</html>
