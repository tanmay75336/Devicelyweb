<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Devicely - Sign Up</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="auth-body signup-body">
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-top-row">
        <a href="index.html" class="auth-back-link">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Back to home
        </a>
      </div>
      <div class="auth-brand">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <rect x="2" y="4" width="20" height="14" rx="2.5" stroke="#3ecf8e" stroke-width="2"/>
          <path d="M8 21h8M12 18v3" stroke="#3ecf8e" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span>devicely</span>
      </div>

      <h1 class="auth-title">Create your account</h1>
      <p class="auth-subtitle">Sign up to save your responsive testing workflow.</p>

      <div id="auth-config-warning" class="auth-config-warning hidden">
        Supabase config missing. Update <code>js/supabase-config.js</code> with your project URL and anon key.
      </div>

      <form id="auth-form" class="auth-form" novalidate>
        <label class="auth-label" for="auth-name">Full Name</label>
        <input id="auth-name" class="auth-input" type="text" autocomplete="name" />

        <label class="auth-label" for="auth-email">Email</label>
        <input id="auth-email" class="auth-input" type="email" autocomplete="email" required />

        <label class="auth-label" for="auth-password">Password</label>
        <div class="auth-password-row">
          <input id="auth-password" class="auth-input" type="password" autocomplete="new-password" required />
          <button id="auth-password-toggle" type="button" class="auth-text-btn">Show</button>
        </div>

        <label class="auth-label" for="auth-confirm-password">Confirm Password</label>
        <input id="auth-confirm-password" class="auth-input" type="password" autocomplete="new-password" required />

        <div id="auth-message" class="auth-message hidden"></div>

        <button id="auth-submit-btn" class="auth-submit-btn" type="submit">
          <span id="auth-submit-text">Create Account</span>
        </button>
      </form>
      <div class="auth-divider"><span>or</span></div>
      <button id="auth-google-btn" class="auth-google-btn" type="button">
        <svg width="16" height="16" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.6 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.7 1.1 7.8 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.4-.4-3.5z"/>
          <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 18.9 12 24 12c3 0 5.7 1.1 7.8 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
          <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.5-5.2l-6.2-5.2c-2 1.5-4.5 2.4-7.3 2.4-5.2 0-9.5-3.3-11.1-8l-6.7 5.2C9.6 39.7 16.2 44 24 44z"/>
          <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-.8 2.3-2.3 4.2-4.1 5.5l6.2 5.2C41 35.6 44 30.4 44 24c0-1.3-.1-2.4-.4-3.5z"/>
        </svg>
        Continue with Google
      </button>

      <p class="auth-footnote">
        Already have an account?
        <a href="login.html">Log in</a>
      </p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/supabase-auth.js"></script>
  <script src="js/auth-pages.js"></script>
</body>
</html>
